<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>We App Testers – Certificate Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --green-dark:  #1B5E20;
    --green-med:   #2E7D32;
    --green-light: #4CAF50;
    --gold:        #C9A84C;
    --gold-light:  #F0D080;
    --cream:       #FAFAF2;
    --bg:          #0F1F10;
    --card:        #162318;
    --border:      #2a3d2b;
    --text:        #e8f5e9;
    --muted:       #7fa882;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0 0 40px;
  }

  /* ── Header ── */
  header {
    background: linear-gradient(135deg, var(--green-dark) 0%, #0a1a0b 100%);
    border-bottom: 2px solid var(--gold);
    padding: 20px 20px 18px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(201,168,76,0.15) 0%, transparent 70%);
  }
  .logo-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    position: relative;
  }
  .android-icon {
    width: 38px; height: 38px;
    flex-shrink: 0;
  }
  .brand-name {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 800;
    color: #fff;
    letter-spacing: 1px;
  }
  .brand-name span { color: var(--gold); }
  .brand-sub {
    font-size: 11px;
    color: var(--gold-light);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 4px;
    position: relative;
  }

  /* ── Card ── */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    margin: 22px 16px 0;
    padding: 24px 20px;
  }
  .card-title {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── Form fields ── */
  .field { margin-bottom: 16px; }
  label {
    display: block;
    font-size: 11px;
    font-weight: 500;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  input, select {
    width: 100%;
    background: #0F1F10;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    padding: 12px 14px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    -webkit-appearance: none;
  }
  input:focus, select:focus {
    border-color: var(--green-light);
    box-shadow: 0 0 0 3px rgba(76,175,80,0.15);
  }
  input::placeholder { color: #3a5c3b; }

  .field-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  /* ── Generate Button ── */
  .btn-generate {
    width: 100%;
    background: linear-gradient(135deg, var(--green-med), var(--green-dark));
    border: none;
    border-radius: 12px;
    color: #fff;
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 1px;
    padding: 16px;
    cursor: pointer;
    margin-top: 8px;
    position: relative;
    overflow: hidden;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 20px rgba(46,125,50,0.4);
  }
  .btn-generate:active { transform: scale(0.98); }
  .btn-generate::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(201,168,76,0.2), transparent);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .btn-generate:hover::before { opacity: 1; }

  /* ── Preview ── */
  #preview-section {
    display: none;
    margin: 22px 16px 0;
  }
  #preview-section.show { display: block; }

  .preview-box {
    background: var(--card);
    border: 1px solid var(--gold);
    border-radius: 16px;
    padding: 20px;
    text-align: center;
  }
  .preview-title {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 16px;
  }
  .preview-details {
    background: #0F1F10;
    border-radius: 10px;
    padding: 14px;
    text-align: left;
    margin-bottom: 16px;
  }
  .preview-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    gap: 10px;
  }
  .preview-row:last-child { border-bottom: none; }
  .preview-key { color: var(--muted); flex-shrink: 0; }
  .preview-val { color: var(--text); font-weight: 500; text-align: right; }

  .btn-download {
    width: 100%;
    background: linear-gradient(135deg, var(--gold), #a07820);
    border: none;
    border-radius: 12px;
    color: #1a1000;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 800;
    letter-spacing: 1px;
    padding: 15px;
    cursor: pointer;
    transition: transform 0.15s;
    box-shadow: 0 4px 20px rgba(201,168,76,0.4);
  }
  .btn-download:active { transform: scale(0.98); }

  .btn-new {
    width: 100%;
    background: transparent;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    padding: 12px;
    cursor: pointer;
    margin-top: 10px;
  }

  /* ── Success Toast ── */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--green-med);
    color: #fff;
    font-size: 14px;
    font-weight: 500;
    padding: 12px 24px;
    border-radius: 30px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    transition: transform 0.35s cubic-bezier(.34,1.56,.64,1);
    white-space: nowrap;
    z-index: 999;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header>
  <div class="logo-row">
    <svg class="android-icon" viewBox="0 0 40 40" fill="none">
      <ellipse cx="20" cy="14" rx="11" ry="9" fill="#4CAF50"/>
      <rect x="9" y="18" width="22" height="14" rx="3" fill="#4CAF50"/>
      <circle cx="16" cy="13" r="1.5" fill="white"/>
      <circle cx="24" cy="13" r="1.5" fill="white"/>
      <line x1="14" y1="8" x2="11" y2="4" stroke="#4CAF50" stroke-width="2" stroke-linecap="round"/>
      <line x1="26" y1="8" x2="29" y2="4" stroke="#4CAF50" stroke-width="2" stroke-linecap="round"/>
      <rect x="6" y="19" width="4" height="9" rx="2" fill="#388E3C"/>
      <rect x="30" y="19" width="4" height="9" rx="2" fill="#388E3C"/>
    </svg>
    <div>
      <div class="brand-name">WE <span>APP</span> TESTERS</div>
    </div>
  </div>
  <div class="brand-sub">Certificate Generator</div>
</header>

<!-- Form -->
<div id="form-section">
  <div class="card">
    <div class="card-title">📋 App Details</div>

    <div class="field">
      <label>App Name</label>
      <input type="text" id="app_name" placeholder="e.g. My Fitness App">
    </div>
    <div class="field">
      <label>Package Name</label>
      <input type="text" id="package_name" placeholder="e.g. com.company.appname">
    </div>
    <div class="field-row">
      <div class="field">
        <label>Version</label>
        <input type="text" id="version" placeholder="e.g. 1.0.0">
      </div>
      <div class="field">
        <label>No. of Testers</label>
        <input type="text" id="num_testers" placeholder="e.g. 12+">
      </div>
    </div>
    <div class="field">
      <label>Testing Type</label>
      <select id="testing_type">
        <option>Google Play Closed Testing</option>
        <option>Google Play Open Testing</option>
        <option>Google Play Internal Testing</option>
        <option>Beta Testing</option>
        <option>Functional Testing</option>
      </select>
    </div>
  </div>

  <div class="card">
    <div class="card-title">📅 Dates & Reference</div>

    <div class="field-row">
      <div class="field">
        <label>Start Date</label>
        <input type="date" id="period_start">
      </div>
      <div class="field">
        <label>End Date</label>
        <input type="date" id="period_end">
      </div>
    </div>
    <div class="field-row">
      <div class="field">
        <label>Issue Date</label>
        <input type="date" id="issue_date">
      </div>
      <div class="field">
        <label>Ref. Number</label>
        <input type="text" id="ref_number" placeholder="e.g. WAT-54822">
      </div>
    </div>
  </div>

  <div style="margin: 16px 16px 0;">
    <button class="btn-generate" onclick="generatePreview()">
      ⚡ GENERATE CERTIFICATE
    </button>
  </div>
</div>

<!-- Preview -->
<div id="preview-section">
  <div class="preview-box">
    <div class="preview-title">✅ Ready to Download</div>
    <div class="preview-details" id="preview-details"></div>
    <button class="btn-download" onclick="downloadPDF()">
      ⬇️ DOWNLOAD PDF
    </button>
    <button class="btn-new" onclick="newCertificate()">+ New Certificate</button>
  </div>
</div>

<div class="toast" id="toast">✅ PDF Downloaded!</div>

<script>
const { jsPDF } = window.jspdf;

// Format date from YYYY-MM-DD to "01 March 2026"
function formatDate(val) {
  if (!val) return '';
  const d = new Date(val + 'T00:00:00');
  return d.toLocaleDateString('en-GB', { day:'2-digit', month:'long', year:'numeric' });
}

// Auto-set today as issue date and auto ref number
window.onload = () => {
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('issue_date').value = today;
  // Auto ref
  const num = Math.floor(50000 + Math.random() * 9999);
  document.getElementById('ref_number').value = 'WAT-' + num;
};

function getData() {
  return {
    app_name:     document.getElementById('app_name').value.trim(),
    package_name: document.getElementById('package_name').value.trim(),
    version:      document.getElementById('version').value.trim(),
    num_testers:  document.getElementById('num_testers').value.trim() + ' Android Testers',
    testing_type: document.getElementById('testing_type').value,
    period_start: formatDate(document.getElementById('period_start').value),
    period_end:   formatDate(document.getElementById('period_end').value),
    issue_date:   formatDate(document.getElementById('issue_date').value),
    ref_number:   document.getElementById('ref_number').value.trim(),
  };
}

function generatePreview() {
  const d = getData();
  if (!d.app_name) { alert('Please enter App Name'); return; }
  if (!d.package_name) { alert('Please enter Package Name'); return; }
  if (!d.period_start || !d.period_end) { alert('Please select Testing Period dates'); return; }

  const rows = [
    ['App Name', d.app_name],
    ['Package', d.package_name],
    ['Version', d.version || '—'],
    ['Testing Type', d.testing_type],
    ['Testers', d.num_testers],
    ['Period', `${d.period_start} – ${d.period_end}`],
    ['Ref No.', d.ref_number],
    ['Issue Date', d.issue_date],
  ];

  document.getElementById('preview-details').innerHTML = rows.map(([k,v]) =>
    `<div class="preview-row"><span class="preview-key">${k}</span><span class="preview-val">${v}</span></div>`
  ).join('');

  document.getElementById('form-section').style.display = 'none';
  document.getElementById('preview-section').classList.add('show');
  window.scrollTo(0, 0);
}

function newCertificate() {
  document.getElementById('form-section').style.display = 'block';
  document.getElementById('preview-section').classList.remove('show');
  window.scrollTo(0, 0);
}

function downloadPDF() {
  const d = getData();
  const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });

  const W = 297, H = 210;
  const GREEN_DARK  = [27, 94, 32];
  const GREEN_MED   = [46, 125, 50];
  const GOLD        = [201, 168, 76];
  const CREAM       = [250, 250, 242];
  const TEXT_DARK   = [26, 26, 26];
  const TEXT_MID    = [80, 80, 80];
  const GREY_LINE   = [200, 200, 200];

  // Outer green border
  doc.setFillColor(...GREEN_DARK);
  doc.roundedRect(4, 4, W-8, H-8, 5, 5, 'F');

  // Gold border line
  doc.setDrawColor(...GOLD);
  doc.setLineWidth(1);
  doc.roundedRect(8, 8, W-16, H-16, 4, 4, 'S');

  // Cream inner
  doc.setFillColor(...CREAM);
  doc.roundedRect(11, 11, W-22, H-22, 3, 3, 'F');

  // Android icon (simplified circles)
  doc.setFillColor(...GREEN_MED);
  doc.ellipse(22, 22, 5, 4, 'F');
  doc.rect(17, 22, 10, 6, 'F');
  doc.setFillColor(255,255,255);
  doc.circle(20.5, 21.5, 0.8, 'F');
  doc.circle(23.5, 21.5, 0.8, 'F');

  // WE APP TESTERS
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(13);
  doc.setTextColor(...GREEN_DARK);
  doc.text('WE APP TESTERS', 30, 21);
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(7);
  doc.setTextColor(...TEXT_MID);
  doc.text('Android Testing Experts', 30, 26);

  // Ref & Date top right
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(8);
  doc.setTextColor(...TEXT_DARK);
  doc.text(`Testing Reference: ${d.ref_number}`, W - 14, 21, { align: 'right' });
  doc.setFont('helvetica', 'normal');
  doc.text(`Issue Date: ${d.issue_date}`, W - 14, 26, { align: 'right' });

  // Divider 1
  doc.setDrawColor(...GREY_LINE);
  doc.setLineWidth(0.4);
  doc.line(14, 32, W - 14, 32);

  // Main title
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(16);
  doc.setTextColor(...TEXT_DARK);
  doc.text('APP TESTING COMPLETION CERTIFICATE', W/2, 42, { align: 'center' });

  // Sub title
  doc.setFontSize(10);
  doc.text('CERTIFICATE OF TESTING', W/2, 50, { align: 'center' });

  // Divider 2
  doc.setDrawColor(...GREY_LINE);
  doc.setLineWidth(0.4);
  doc.line(14, 53, W - 14, 53);

  // Intro text
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(8);
  doc.setTextColor(...TEXT_MID);
  doc.text(
    'This is to certify that the Android application listed below has successfully completed a structured testing process conducted by We App Testers.',
    15, 59, { maxWidth: W - 30 }
  );

  // Fields
  const fields = [
    ['App Name:', d.app_name],
    ['Package Name:', d.package_name],
    ['Version Tested:', d.version || '—'],
    ['Testing Type:', d.testing_type],
    ['Number of Testers:', d.num_testers],
    ['Testing Period:', `${d.period_start} – ${d.period_end}`],
  ];

  let fy = 66;
  const rowH = 8;
  fields.forEach(([label, value], i) => {
    if (i % 2 === 0) {
      doc.setFillColor(235, 240, 230);
      doc.rect(14, fy - 1, W - 28, rowH, 'F');
    }
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(8.5);
    doc.setTextColor(...TEXT_DARK);
    doc.text(label, 16, fy + 4.5);
    doc.setFont('helvetica', 'normal');
    doc.setTextColor(...TEXT_MID);
    doc.text(value, 70, fy + 4.5);
    doc.setDrawColor(...GREY_LINE);
    doc.setLineWidth(0.3);
    doc.line(14, fy + rowH - 1, W - 14, fy + rowH - 1);
    fy += rowH;
  });

  // Description
  const descY = fy + 4;
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(8);
  doc.setTextColor(...TEXT_MID);
  doc.text(
    'During the testing period, the application was installed and used by multiple testers across different Android devices. Testers evaluated installation flow, basic functionality, usability, and overall app performance while providing feedback during the testing period.',
    15, descY, { maxWidth: W - 30 }
  );

  // Footer
  const footY = H - 30;

  // Issued by
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(8);
  doc.setTextColor(...TEXT_DARK);
  doc.text('Issued By:', 15, footY);
  doc.setFontSize(9);
  doc.setTextColor(...GREEN_DARK);
  doc.text('We App Testers', 15, footY + 5);
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(7.5);
  doc.setTextColor(...TEXT_MID);
  doc.text('Android App Testing Service', 15, footY + 10);
  doc.text('Contact: +91 9122061839', 15, footY + 15);

  // Signature line
  doc.setDrawColor(...TEXT_DARK);
  doc.setLineWidth(0.5);
  doc.line(W/2 - 15, footY + 5, W/2 + 25, footY + 5);
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(8);
  doc.setTextColor(...TEXT_DARK);
  doc.text('Testing Manager', W/2 + 5, footY + 10, { align: 'center' });

  // Gold Seal
  const sx = W - 35, sy = footY + 5;
  doc.setFillColor(...GOLD);
  doc.circle(sx, sy, 16, 'F');
  doc.setFillColor(...GREEN_DARK);
  doc.circle(sx, sy, 13, 'F');
  doc.setFillColor(255,255,255);
  doc.circle(sx, sy, 9, 'F');
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(6);
  doc.setTextColor(...GREEN_DARK);
  doc.text('Verified', sx, sy - 3, { align: 'center' });
  doc.setFontSize(5);
  doc.text('Testing Completed', sx, sy + 1, { align: 'center' });
  doc.setDrawColor(...GOLD);
  doc.setLineWidth(0.5);
  doc.line(sx - 6, sy + 2.5, sx + 6, sy + 2.5);
  doc.setTextColor(...GOLD);
  doc.setFontSize(4.5);
  doc.text('TESTED BY', sx, sy + 5, { align: 'center' });
  doc.setTextColor(...GREEN_DARK);
  doc.setFontSize(5.5);
  doc.text('We App Testers', sx, sy + 8.5, { align: 'center' });

  // Disclaimer
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(6.5);
  doc.setTextColor(120, 120, 120);
  doc.text(
    `Disclaimer: This certificate confirms that the specified version of the application was tested during the stated testing period by We App Testers. This certification applies only to the version mentioned above.`,
    15, H - 14, { maxWidth: W - 30 }
  );

  // Save
  const filename = `WAT_Certificate_${d.app_name.replace(/\s+/g, '_')}.pdf`;
  doc.save(filename);

  showToast();
}

function showToast() {
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
</body>
  </html>
